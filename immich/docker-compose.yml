# Este archivo define todos los servicios que necesita Immich
# para funcionar como tu nube de fotos personal

services:
  # Servicio principal de Immich - la app web
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    ports:
      - "2283:2283"  # puerto para acceder desde el navegador
    volumes:
      - /mnt/fotos:/usr/src/app/upload  # donde se guardan tus fotos
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USERNAME=${DB_USERNAME}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME}
    depends_on:
      - database
      - redis
    restart: always  # si se cae, se levanta solo

  # Base de datos donde Immich guarda info de tus fotos
  database:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data  # datos de la base de datos
    restart: always

  # Cache para que Immich sea mas rapido
  redis:
    image: redis:6.2
    restart: always

# Volumenes donde Docker guarda los datos permanentes
volumes:
  db_data:
